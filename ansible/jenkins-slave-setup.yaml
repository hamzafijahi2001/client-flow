---
- hosts: jenkins-slave
  become: true 
  vars:
    venv_path: /home/ubuntu/venv
  tasks: 
  - name: Update all the packages to their latest version
    ansible.builtin.apt:
      update_cache: yes
      
  - name: Install Python
    ansible.builtin.apt:
      name: 
        - python3
        - python3-pip
      state: present
      update_cache: yes

  - name: Install Python venv package
    ansible.builtin.apt:
      name: python3-venv
      state: present
      update_cache: yes

  - name: Install Java
    ansible.builtin.apt:
      name: openjdk-21-jre
      state: present
  - name: Install curl and ca-certificates
    apt:
      name:
        - curl
        - ca-certificates
        - gnupg
      state: present
      update_cache: yes

  - name: Add NodeSource Node 22 repository
    shell: |
      curl -fsSL https://deb.nodesource.com/setup_22.x | bash -
    args:
      creates: /etc/apt/sources.list.d/nodesource.list
      
  - name: Install nodejs
    ansible.builtin.apt:
      name: nodejs
      state: latest
      update_cache: yes

  - name: Install npm
    ansible.builtin.apt:
      name: npm
      state: latest

  - name: install docker 
    apt: 
      name: docker.io 
      state: present

  - name: start docker services 
    service: 
      name: docker 
      state: started 
  
  - name: give 777 permissions on /var/run/docker.sock
    file: 
      path: /var/run/docker.sock
      state: file 
      mode: 0777

  - name: start docker on boot time 
    service: 
      name: docker 
      enabled: yes 
      